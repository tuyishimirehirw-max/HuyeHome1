<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huye Homes - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div id="loginContainer" class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-house-chimney"></i>
                <h2>Huye Homes Admin</h2>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
        </div>
    </div>

    <div id="dashboardContainer" style="display: none;">
        <nav class="admin-nav">
            <div class="nav-brand">
                <i class="fas fa-house-chimney"></i>
                <span>Huye Homes Admin</span>
            </div>
            <div class="nav-menu">
                <button class="nav-btn active" data-view="dashboard">
                    <i class="fas fa-chart-line"></i> Dashboard
                </button>
                <button class="nav-btn" data-view="properties">
                    <i class="fas fa-building"></i> Properties
                </button>
                <button class="nav-btn" data-view="add-property">
                    <i class="fas fa-plus-circle"></i> Add Property
                </button>
                <button class="nav-btn" data-view="inquiries">
                    <i class="fas fa-envelope"></i> Inquiries
                </button>
                <button class="nav-btn" data-view="settings">
                    <i class="fas fa-cog"></i> Settings
                </button>
                <button class="nav-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </nav>

        <main class="admin-main">
            <div id="dashboardView" class="view active">
                <h1>Dashboard Overview</h1>
                <div class="stats-grid" id="statsGrid">
                    <!-- Stats loaded via JS -->
                </div>
            </div>

            <div id="propertiesView" class="view">
                <div class="view-header">
                    <h1>Manage Properties</h1>
                    <button class="btn-primary" onclick="showAddPropertyForm()">
                        <i class="fas fa-plus"></i> Add New
                    </button>
                </div>
                <div id="propertiesList"></div>
            </div>

            <div id="addPropertyView" class="view">
                <h1>Add New Property</h1>
                <form id="propertyForm" enctype="multipart/form-data">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Title *</label>
                            <input type="text" name="title" required>
                        </div>
                        <div class="form-group">
                            <label>Property Type *</label>
                            <select name="property_type" required>
                                <option value="residential_land">Residential Land</option>
                                <option value="agricultural_land">Agricultural Land</option>
                                <option value="student_housing">Student Housing</option>
                                <option value="commercial">Commercial</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Listing Type</label>
                            <select name="listing_type">
                                <option value="sale">For Sale</option>
                                <option value="rent">For Rent</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Price (RWF) *</label>
                            <input type="number" name="price" required>
                        </div>
                        <div class="form-group">
                            <label>Location *</label>
                            <input type="text" name="location" required>
                        </div>
                        <div class="form-group">
                            <label>Sector</label>
                            <input type="text" name="sector">
                        </div>
                        <div class="form-group">
                            <label>Size (sqm)</label>
                            <input type="number" name="size" step="0.01">
                        </div>
                        <div class="form-group">
                            <label>Bedrooms</label>
                            <input type="number" name="bedrooms" value="0">
                        </div>
                        <div class="form-group">
                            <label>Bathrooms</label>
                            <input type="number" name="bathrooms" value="0">
                        </div>
                        <div class="form-group full-width">
                            <label>Description *</label>
                            <textarea name="description" rows="5" required></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label>Images (JPEG, PNG, WEBP - Max 10)</label>
                            <input type="file" name="images" multiple accept="image/jpeg,image/png,image/webp">
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" name="is_featured" value="true"> Featured Property
                            </label>
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" name="is_verified" value="true"> Verified Property
                            </label>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Create Property</button>
                </form>
            </div>

            <div id="inquiriesView" class="view">
                <h1>Inquiries</h1>
                <div id="inquiriesList"></div>
            </div>

            <div id="settingsView" class="view">
                <h1>Site Settings</h1>
                <form id="settingsForm">
                    <div id="settingsFields"></div>
                    <button type="submit" class="btn-primary">Save Settings</button>
                </form>
            </div>
        </main>
    </div>

    <script src="/admin/js/admin.js"></script>
</body>
</html>
